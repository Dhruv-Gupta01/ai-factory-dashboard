version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    volumes:
      - db-data:/app/data
    environment:
      - PORT=3001
      - DB_PATH=/app/data/factory.db
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

  simulator:
    build: ./simulator
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - API_URL=http://backend:3001
      - INTERVAL_MS=15000

volumes:
  db-data:
